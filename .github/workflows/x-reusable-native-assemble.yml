name: X Assemble Native Image

on:
  workflow_call:
    inputs:
      project-version:
        required: true
        type: string
      graal-version:
        default: '25.0.1'
        required: false
        type: string
      graal-java-version:
        default: '25'
        required: false
        type: string

jobs:
  assemble:
    name: 'Assemble ${{ matrix.os }}'
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-15-intel, macos-15, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Graal
        uses: graalvm/setup-graalvm@v1
        with:
          version: ${{ inputs.graal-version }}
          java-version: ${{ inputs.graal-java-version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          distribution: graalvm-community

      - name: Setup JDKs
        shell: bash
        run: |
          cd helloworld-java-graalvm
          ./mvnw -ntp -B -q -Pjdks

      - name: Build
        shell: bash
        run: |
          cd helloworld-java-graalvm
          ./mvnw -ntp -B verify

      - name: Assemble
        uses: jreleaser/release-action@v2
        with:
          arguments: assemble --config-file helloworld-java-graalvm/jreleaser.yml
        env:
          JRELEASER_PROJECT_VERSION: ${{ inputs.project-version }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: JReleaser output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jreleaser-assemble-${{ matrix.os }}
          path: |
            helloworld-java-graalvm/out/jreleaser/trace.log
            helloworld-java-graalvm/out/jreleaser/output.properties

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          retention-days: 1
          name: native-image-${{ runner.os }}-${{ runner.arch }}
          path: |
            helloworld-java-graalvm/out/jreleaser/assemble/helloworld/native-image/*.zip
